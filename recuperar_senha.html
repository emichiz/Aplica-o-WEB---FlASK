<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Recuperar Senha</title>
<link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
</head>

<body>
    <div class="page">
        {% if error %}
            <!-- Adicionando o ID 'error-message' -->
            <p id="error-message" class="error-message custom-error">{{ error }}</p>
        {% endif %}
        <div class="formLogin" style="text-align: center;">
            <h1 style="font-size: 24px;">Recuperação de Senha</h1>
            <p style="margin-bottom: 10px;"></p>
            <form method="POST" action="/recuperar_senha">
                <label for="email" class="form-label">E-mail:</label><br>
                <input type="email" id="email" name="email" class="input-field" required><br><br>
                <input type="submit" value="Enviar" class="submit-btn">
            </form>
        </div>
    </div>
</body>
</html>
