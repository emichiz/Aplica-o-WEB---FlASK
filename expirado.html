<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title> style="font-size: 12px;" > E-mail não encontrado</title>
    <link rel="stylesheet" href="{{ url_for('static', filename='main.css') }}">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" rel="stylesheet">


</head>
<body>
    <div class="page">
        <form>
        {% if error %}
            <!-- Adicionando o ID 'error-message' -->
            <p id="error-message" class="error-message custom-error">{{ error }}</p>
        {% endif %}


        <div class="formLogin" style="text-align: center;">

        <i class="fas fa-envelope-square fa-5x"></i>

        <h1  class="error-message custom-error"; style="font-size: 14px "> Erro na redefinição. <br> Seu link está expirado.</h1>


        </form>
    </div>
</body>
</html>
